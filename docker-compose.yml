services:
  pos-service:
    image: nahsbyte/pos-service:latest
    container_name: pos-service
    restart: always
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://157.10.161.207:5432/nivora-pos-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: NivoraPOSSecretKey2024VeryLongSecretForHS256Algorithm
      JWT_EXPIRATION: 86400000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
